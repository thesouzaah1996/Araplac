<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fila de Recebimento • Araplac</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/dashboard.css">
    <link rel="stylesheet" href="./css/aguardando-descarga.css">
</head>

<body>

<header class="app-header">
    <div class="container header-row">
        <a href="dashboard.html" class="brand d-flex align-items-center gap-3">
            <img src="./img/logo.png" alt="Logo" class="brand-logo">
        </a>

        <div class="session ms-auto">
            <div class="dropdown">
                <button class="btn-profile dropdown-toggle" type="button"
                    data-bs-toggle="dropdown">
                    <div class="profile-avatar">
                        <i class="bi bi-person-circle"></i>
                    </div>
                    <span>Usuário</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><button class="dropdown-item text-danger"
                        data-bs-toggle="modal"
                        data-bs-target="#logoutModal">
                        <i class="bi bi-box-arrow-right me-2"></i>Sair
                    </button></li>
                </ul>
            </div>
        </div>
    </div>
</header>

<main class="app-main">
    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <button class="btn btn-danger"
                onclick="toggleHistorico()">
                <i class="bi bi-clock-history me-2"></i>
                Histórico de Entregas
            </button>
        </div>

        <div class="card shadow-sm mb-5">
            <div class="card-body">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Empresa</th>
                            <th>Produto</th>
                            <th>Chegada</th>
                            <th>Motorista</th>
                            <th>Status</th>
                            <th class="text-end">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="filaTable"></tbody>
                </table>
            </div>
        </div>

        <div id="historicoSection" style="display:none;">
            <h4 class="fw-bold mb-3">
                <i class="bi bi-clock-history me-2"></i>
                Histórico de Entregas
            </h4>

            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Empresa</th>
                                <th>Produto</th>
                                <th>Motorista</th>
                                <th>Data</th>
                                <th>Status</th>
                                <th class="text-end">Observações</th>
                            </tr>
                        </thead>
                        <tbody id="historicoTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</main>

<footer class="app-footer">
    <div class="container text-center">
        © 2025 Araplac Móveis — Almoxarifado
    </div>
</footer>

<div class="modal fade" id="finalizarModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header border-0">
        <h5 class="modal-title">
          <i class="bi bi-clipboard-check me-2 text-success"></i>
          Finalizar Recebimento
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">Observações *</label>
          <textarea id="modalObservacao" class="form-control" rows="3"></textarea>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="modalDependencia">
          <label class="form-check-label text-warning fw-semibold">
            Marcar como Dependência
          </label>
        </div>
      </div>

      <div class="modal-footer border-0">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">
          Cancelar
        </button>
        <button class="btn btn-success" onclick="confirmarFinalizacao()">
          Confirmar
        </button>
      </div>

    </div>
  </div>
</div>

<div id="alertContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/aguardando-descarga.js"></script>

</body>
</html>
